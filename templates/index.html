<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TANVIR EXE | ADMIN PANEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #030304;
            background-image: 
                radial-gradient(circle at 50% 120%, #3d0b0b 0%, #030304 60%),
                radial-gradient(circle at 10% 10%, #1a0505 0%, transparent 20%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            padding: 20px;
        }

        .admin-container {
            width: 100%;
            max-width: 850px;
            background: rgba(15, 10, 10, 0.98);
            border: 1px solid rgba(255, 71, 87, 0.2);
            border-top: 3px solid #ff4757;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            position: relative;
        }

        .title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 0 15px rgba(255, 71, 87, 0.5);
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto auto;
            gap: 15px;
            margin-bottom: 40px;
            background: rgba(255, 71, 87, 0.03);
            padding: 25px;
            border-radius: 8px;
            border: 1px solid rgba(255, 71, 87, 0.1);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 12px;
            color: #ff4757;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1.5px;
        }

        .input-box {
            background: rgba(20, 10, 10, 0.9);
            border: 1px solid #441111;
            padding: 14px;
            color: #fff;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

        .input-box:focus {
            border-color: #ff4757;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.2);
        }

        .add-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            align-self: flex-end;
            height: 48px;
            transition: 0.3s;
        }

        .add-btn:hover {
            background: #ff6b81;
            transform: translateY(-2px);
        }

        .logs-section {
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            color: #ff4757;
            padding: 15px;
            background: rgba(255, 71, 87, 0.05);
            text-transform: uppercase;
            font-size: 13px;
            border-bottom: 2px solid #331111;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #221111;
            color: #ddd;
        }

        .icon-btn {
            cursor: pointer;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 50%;
            color: #ff4757;
            transition: 0.2s;
            font-size: 18px;
            margin: 0 auto;
        }

        .icon-btn:hover {
            background: #ff4757;
            color: #fff;
            transform: rotate(90deg);
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #0f0a0a;
            border: 1px solid #ff4757;
            border-radius: 12px;
            padding: 30px;
            width: 350px;
            box-shadow: 0 0 40px rgba(255, 71, 87, 0.4);
        }

        .modal-title {
            font-family: 'Rajdhani';
            color: #ff4757;
            margin-bottom: 20px;
            text-align: center;
            font-size: 20px;
            letter-spacing: 2px;
        }

        .modal-input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .modal-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #ff4757;
            border: none;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
        }

        .modal-btn.secondary {
            background: transparent;
            border: 1px solid #331111;
            color: #888;
        }

        .modal-btn.delete {
            background: transparent;
            border: 1px solid #ff4757;
            color: #ff4757;
        }

        #notification {
            position: fixed;
            top: 30px;
            right: -350px;
            background: #0f0a0a;
            color: #fff;
            border-left: 4px solid #ff4757;
            padding: 18px 30px;
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3000;
        }

        #notification.show { right: 30px; }
    </style>
</head>
<body onload="setDefaultDate(); loadExistingUIDs()">

<div id="notification">Action Success</div>

<div class="admin-container">
    <h1 class="title">TANVIR EXE CONTROL</h1>

    <div class="input-grid">
        <div class="form-group">
            <label>Authentication UID</label>
            <input type="text" id="uidInput" class="input-box" placeholder="EX : 1757453232">
        </div>
        <div class="form-group">
            <label>Expiry Schedule</label>
            <input type="date" id="dateInput" class="input-box">
        </div>
        <button class="add-btn" onclick="addUid()">Register</button>
        <button class="add-btn" onclick="directRemoveUid()">REMOVE</button>
            </div>

    <div class="logs-section">
        <table>
            <thead>
                <tr>
                    <th>Target UID</th>
                    <th>Status / Expiry</th>
                    <th style="text-align: center;">Action</th>
                    <th style="text-align: center;">Added By</th>
                </tr>
            </thead>
            <tbody id="logTable"></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <h3 class="modal-title">UPDATE ACCESS</h3>
        
        <div class="modal-input-group">
            <label>Edit UID</label>
            <input type="text" id="editUidBox" class="input-box" style="width:100%; margin-top:5px;">
        </div>

        <div class="modal-input-group">
            <label>Edit Expiry</label>
            <input type="date" id="editDateBox" class="input-box" style="width:100%; margin-top:5px;">
        </div>

        <button class="modal-btn" onclick="saveChanges()">SAVE UPDATES</button>
        <button class="modal-btn delete" onclick="triggerDelete()">DELETE ACCESS</button>
        <button class="modal-btn secondary" onclick="closeModal()">CANCEL</button>
    </div>
</div>

<script>
(function () {
  'use strict';
  function isEditableTarget(el) {
    if (!el || el.nodeType !== 1) return false;
    const tag = el.tagName;
    if (tag === 'TEXTAREA') return true;
    if (tag === 'INPUT') {
      const t = (el.type || '').toLowerCase();
      return !['button', 'checkbox', 'radio', 'submit', 'reset', 'file', 'hidden'].includes(t);
    }
    return el.isContentEditable === true;
  }
  function stop(e) {
    e.preventDefault();
    e.stopPropagation();
    return false;
  }
  var DEVTOOL_CODES = { KeyI: 1, KeyJ: 1, KeyC: 1, KeyK: 1, KeyM: 1, KeyP: 1, KeyE: 1 };
  document.addEventListener('keydown', function (e) {
      if (isEditableTarget(e.target)) {
        var k = (e.key || '').toLowerCase();
        if ((e.ctrlKey || e.metaKey) && ['c', 'v', 'x', 'a'].includes(k)) return;
      }
      if (e.key === 'F12' || e.keyCode === 123) return stop(e);
      if (e.shiftKey && (e.key === 'F10' || e.code === 'F10')) return stop(e);
      var mod = e.ctrlKey || e.metaKey;
      var code = e.code || '';
      if (mod && e.shiftKey && !e.altKey && DEVTOOL_CODES[code]) return stop(e);
      if (code === 'Backquote') {
        if (e.ctrlKey && !e.metaKey && !e.altKey && !e.shiftKey) return stop(e);
        if (e.ctrlKey && !e.metaKey && e.shiftKey) return stop(e);
      }
      if (e.metaKey && e.altKey) {
        if (['KeyI', 'KeyJ', 'KeyC', 'KeyU'].indexOf(code) !== -1) return stop(e);
      }
      if (mod && !e.shiftKey && !e.altKey) {
        if (code === 'KeyU' || code === 'KeyS') return stop(e);
      }
      if (mod && e.shiftKey && code === 'KeyU') return stop(e);
    }, true);
  document.addEventListener('contextmenu', function (e) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }, true);
  document.addEventListener('mousedown', function (e) {
      if (e.button === 2) {
          e.preventDefault();
          e.stopPropagation();
      }
    }, true);
})();

    let database = [];
    let currentSelectedIndex = null;

    function setDefaultDate() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').value = today;
    }

    function showNotify(msg) {
        const n = document.getElementById('notification');
        n.innerText = msg;
        n.classList.add('show');
        setTimeout(() => n.classList.remove('show'), 3000);
    }

    async function addUid() {
        const uid = document.getElementById('uidInput').value.trim();
        const date = document.getElementById('dateInput').value;

        if (uid.length < 9 || uid.length > 15) {
            showNotify("Invalid UID Length");
            return;
        }
        if (!date) {
            showNotify("Select Expiry Date");
            return;
        }

        // Calculate days from today to selected date
        const today = new Date();
        const expiryDate = new Date(date);
        const days = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
        
        if (days <= 0) {
            showNotify("Expiry date must be in the future");
            return;
        }

        try {
            const response = await fetch('/add_uid', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ uid, days })
            });

            const result = await response.json();

            if (result.success) {
                database.push({ uid, date, added_by: result.admin_user || 'Unknown' });
                document.getElementById('uidInput').value = '';
                setDefaultDate();
                renderTable();
                showNotify("UID Registered");
            } else {
                showNotify("Failed to add UID");
            }
        } catch (error) {
            showNotify("Connection Error");
        }
    }

    function renderTable() {
        const tbody = document.getElementById('logTable');
        tbody.innerHTML = '';
        database.forEach((item, index) => {
            const row = `<tr>
                <td>${item.uid}</td>
                <td>${item.date}</td>
                <td style="text-align: center;">
                    <button class="icon-btn" onclick="openEditModal(${index})">⚙</button>
                </td>
                <td style="text-align: center; font-size: 12px; color: #888;">
                    ${item.added_by ? `Added by: ${item.added_by}` : ''}
                </td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    function openEditModal(index) {
        currentSelectedIndex = index;
        document.getElementById('editUidBox').value = database[index].uid;
        document.getElementById('editDateBox').value = database[index].date;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }

    async function saveChanges() {
        const newUid = document.getElementById('editUidBox').value.trim();
        const newDate = document.getElementById('editDateBox').value;

        if (newUid.length < 9 || newUid.length > 15) {
            showNotify("UID must be 9-15 characters long");
            return;
        }
        if (!newDate) {
            showNotify("Select Expiry Date");
            return;
        }

        // Calculate days from today to selected date
        const today = new Date();
        const expiryDate = new Date(newDate);
        const days = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
        
        if (days <= 0) {
            showNotify("Expiry date must be in the future");
            return;
        }

        try {
            const response = await fetch('/edit_uid', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ uid: newUid, days })
            });

            const result = await response.json();

            if (result.success) {
                database[currentSelectedIndex].uid = newUid;
                database[currentSelectedIndex].date = newDate;
                renderTable();
                showNotify("✅ Data Updated Successfully");
                closeModal();
            } else {
                showNotify("❌ " + (result.error || "Failed to update UID"));
            }
        } catch (error) {
            showNotify("Connection Error");
        }
    }

    async function triggerDelete() {
        try {
            const uid = database[currentSelectedIndex].uid;
            
            if (!confirm(`⚠️ Are you sure you want to remove UID "${uid}"?\n\nThis action cannot be undone.`)) {
                return;
            }
            
            const response = await fetch('/remove_uid', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ uid })
            });

            const result = await response.json();

            if (result.success) {
                database.splice(currentSelectedIndex, 1);
                renderTable();
                showNotify("✅ Access Deleted Successfully");
                closeModal();
            } else {
                showNotify("❌ " + (result.error || "Failed to delete UID"));
            }
        } catch (error) {
            showNotify("❌ Connection Error");
        }
    }

    async function directRemoveUid() {
        const uid = document.getElementById('uidInput').value.trim();
        
        if (!uid) {
            showNotify("⚠️ Please enter UID to remove");
            return;
        }
        
        if (uid.length < 9 || uid.length > 15) {
            showNotify("⚠️ Invalid UID Length (9-15 characters required)");
            return;
        }
        
        try {
            const response = await fetch('/remove_uid', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ uid })
            });

            const result = await response.json();

            if (result.success) {
                // Remove from local database if exists
                const index = database.findIndex(item => item.uid === uid);
                if (index !== -1) {
                    database.splice(index, 1);
                    renderTable();
                }
                document.getElementById('uidInput').value = '';
                showNotify("✅ UID Removed Successfully from Server");
            } else {
                showNotify("❌ " + (result.error || "Failed to remove UID"));
            }
        } catch (error) {
            showNotify("❌ Connection Error");
        }
    }

    async function removeAllUids() {
        if (database.length === 0) {
            showNotify("No UIDs to remove");
            return;
        }
        
        if (!confirm(`Are you sure you want to remove all ${database.length} UIDs?`)) {
            return;
        }
        
        try {
            // Remove each UID from server
            const removePromises = database.map(item => 
                fetch('/remove_uid', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ uid: item.uid })
                })
            );
            
            await Promise.all(removePromises);
            
            // Clear local database after successful server removal
            database = [];
            renderTable();
            showNotify("✅ All UIDs Removed Successfully");
        } catch (error) {
            showNotify("❌ Connection Error");
        }
    }

    // Load existing UIDs when page loads
    async function loadExistingUIDs() {
        try {
            const response = await fetch('/get_existing_uids');
            const result = await response.json();
            
            if (result.success && result.data) {
                database = result.data.map(item => ({
                    uid: item.account_id || item.uid,
                    date: item.added_at ? new Date(item.added_at).toISOString().split('T')[0] : item.expiry_date || item.date,
                    added_by: item.adder_admin || item.added_by || 'Unknown'
                }));
                renderTable();
                console.log('Loaded existing UIDs:', database);
            }
        } catch (error) {
            console.error('Failed to load existing UIDs:', error);
        }
    }
</script>

</body>
</html>
