<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QUOTEX SIGNAL BOT | TANVIR EXE</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary-neon: #00fff2; --up-green: #00ff88; --down-red: #ff3131; --bg-dark: #020205; --card-bg: rgba(18, 18, 25, 0.82); }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans', sans-serif; }
    body { min-height: 100vh; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; overflow: hidden; color: #fff; }
    .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 20%, rgba(0,255,242,0.15) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(0,114,255,0.15) 0%, transparent 50%); filter: blur(90px); }
    #particles-js { position: fixed; width: 100%; height: 100%; z-index: 0; }
    #analysis-overlay { position: absolute; inset: 0; background: var(--bg-dark); z-index: 200; border-radius: 48px; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .loader { width: 48px; height: 48px; border: 3px solid #FFF; border-bottom-color: var(--primary-neon); border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
    @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .ana-text { margin-top: 20px; font-size: 0.8rem; letter-spacing: 4px; color: var(--primary-neon); text-transform: uppercase; }
    .main-container { background: var(--card-bg); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); border: 1px solid rgba(255,255,255,0.12); border-radius: 48px; padding: 38px 24px 32px; width: 95%; max-width: 460px; box-shadow: 0 50px 160px rgba(0,0,0,0.85); position: relative; z-index: 10; }
    .nav-header { text-align: center; margin-bottom: 30px; }
    .brand-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.52rem; font-weight: 700; letter-spacing: 5px; background: linear-gradient(90deg, #00fff2, #fff, #00fff2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 40px rgba(0,255,242,0.5); }
    .bot-subtitle { font-size: 0.73rem; letter-spacing: 4.5px; color: rgba(0,255,242,0.95); margin-top: 5px; text-transform: uppercase; font-weight: 500; }
    .tabs { display: flex; background: rgba(0,0,0,0.45); border-radius: 32px; padding: 6px; margin-bottom: 28px; }
    .tab { flex: 1; padding: 13px 0; text-align: center; font-size: 0.76rem; font-weight: 600; border-radius: 26px; cursor: pointer; transition: all 0.4s ease; }
    .tab.active { background: rgba(255,255,255,0.13); box-shadow: 0 6px 25px rgba(0,255,242,0.3); }
    .signal-card { background: linear-gradient(145deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.025) 100%); border-radius: 36px; padding: 42px 24px 36px; border: 1px solid rgba(255,255,255,0.13); position: relative; overflow: hidden; box-shadow: inset 0 0 40px rgba(255,255,255,0.03); }
    .market-type { font-size: 0.69rem; color: rgba(255,255,255,0.65); letter-spacing: 4px; text-transform: uppercase; }
    #asset-name { font-size: 1.68rem; font-weight: 800; margin: 8px 0 20px; letter-spacing: 1px; }
    #signal-direction { font-size: 4.7rem; font-weight: 900; line-height: 1; margin: 10px 0 24px; letter-spacing: -5px; }
    .CALL { color: var(--up-green); text-shadow: 0 0 65px rgba(0,255,136,0.85); }
    .PUT  { color: var(--down-red);  text-shadow: 0 0 65px rgba(255,49,49,0.85); }
    .info-row { display: flex; gap: 12px; margin-bottom: 22px; }
    .info-box { flex: 1; background: rgba(0,0,0,0.55); padding: 16px 12px; border-radius: 22px; text-align: center; border: 1px solid rgba(255,255,255,0.06); }
    .info-box span { display: block; font-size: 0.61rem; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 1.8px; margin-bottom: 4px; }
    .info-box b { display: block; font-size: 1.25rem; font-weight: 700; }
    .countdown { text-align: center; font-size: 1.24rem; font-weight: 600; color: var(--primary-neon); margin: 20px 0; letter-spacing: 2.2px; }
    .live-indicator { margin-top: 26px; text-align: center; font-size: 0.74rem; color: rgba(255,255,255,0.78); letter-spacing: 2.8px; font-weight: 500; }
    .pulse-node { display: inline-block; width: 10px; height: 10px; background: #00fff2; border-radius: 50%; position: relative; margin-right: 9px; }
    .pulse-node::after { content: ''; position: absolute; inset: -6px; border: 2px solid #00fff2; border-radius: 50%; animation: pulse 1.9s infinite; }
    @keyframes pulse { to { transform: scale(3.2); opacity: 0; } }
    .result-card { background: rgba(255,255,255,0.035); border-radius: 34px; padding: 28px 22px; border: 1px solid rgba(255,255,255,0.1); min-height: 410px; }
    .result-card h3 { text-align: center; font-size: 0.87rem; color: rgba(255,255,255,0.82); margin-bottom: 22px; letter-spacing: 2.2px; }
    .accuracy-box { background: linear-gradient(145deg, rgba(0,255,136,0.1), rgba(0,0,0,0.45)); border: 1px solid rgba(0,255,136,0.25); border-radius: 28px; padding: 20px 0; text-align: center; margin-bottom: 26px; }
    #overall-accuracy { font-size: 2.65rem; font-weight: 800; color: #888; }
    .trade-item { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.09); border-radius: 24px; padding: 17px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .trade-left { flex: 1; }
    .trade-asset { font-size: 0.96rem; font-weight: 600; }
    .trade-info { font-size: 0.79rem; color: rgba(255,255,255,0.6); margin-top: 3px; }
    .trade-signal { font-size: 1.28rem; font-weight: 800; }
    .action-buttons { display: flex; gap: 12px; }
    .win-btn, .loss-btn { padding: 9px 26px; border-radius: 30px; font-weight: 700; font-size: 0.84rem; cursor: pointer; }
    .win-btn  { background: rgba(0,255,136,0.22); color: var(--up-green); border: 1px solid rgba(0,255,136,0.4); }
    .loss-btn { background: rgba(255,49,49,0.22); color: var(--down-red); border: 1px solid rgba(255,49,49,0.4); }
    .result-marked { font-size: 1.12rem; font-weight: 700; padding: 7px 24px; border-radius: 30px; }
  </style>
</head>
<body>
<div class="bg-mesh"></div>
<div id="particles-js"></div>
<div class="main-container">
  <div id="analysis-overlay"><span class="loader"></span><div class="ana-text" id="status-text">ANALYSING...</div></div>
  <div class="nav-header"><div class="brand-title">TANVIR EXE</div><div class="bot-subtitle">QUOTEX LIVE SIGNAL BOT</div></div>
  <div class="tabs"><div class="tab active" onclick="switchTab(0)">CURRENT SIGNAL</div><div class="tab" onclick="switchTab(1)">TRADE RESULT</div><div class="tab" onclick="switchTab(2)">LAST SIGNALS</div></div>
  <div id="tab-0">
    <div class="signal-card">
      <div class="market-type">QUOTEX • LIVE SIGNAL</div>
      <h2 id="asset-name">WAITING...</h2>
      <div id="signal-direction">WAIT</div>
      <div class="info-row">
        <div class="info-box"><span>TIMEFRAME</span><b>M1</b></div>
        <div class="info-box"><span>SIGNAL TIME</span><b id="signal-time">00:00</b></div>
        <div class="info-box"><span>CONFIDENCE</span><b id="confidence-level" style="color:#00ff88;">0%</b></div>
      </div>
      <div id="trade-countdown" class="countdown">Trade in: <span id="trade-timer">00:00</span></div>
      <div id="expiry-countdown" class="countdown" style="display:none; color:#ffcc00;">Expiry in: <span id="expiry-timer">00:00</span></div>
      <div class="live-indicator"><span class="pulse-node"></span>QUOTEX LIVE SIGNAL BOT</div>
    </div>
  </div>
  <div id="tab-1" style="display:none;"><div class="result-card"><h3>TRADE HISTORY</h3><div class="accuracy-box"><div id="overall-accuracy">0%</div></div><div id="result-list"></div></div></div>
  <div id="tab-2" style="display:none;"><div class="result-card"><h3>LAST SIGNALS</h3><div id="last-signals-list"></div></div></div>
</div>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
  particlesJS('particles-js', { particles: { number: { value: 70 }, color: { value: '#00fff2' }, opacity: { value: 0.28 }, size: { value: 1.9 }, line_linked: { enable: true, distance: 145, color: '#00fff2', opacity: 0.12 } }, retina_detect: true });
  
  let curSignal = JSON.parse(localStorage.getItem('tanvir_curSignal')) || null;
  let wins = parseInt(localStorage.getItem('tanvir_wins')) || 0;
  let total = parseInt(localStorage.getItem('tanvir_total')) || 0;
  let history = JSON.parse(localStorage.getItem('tanvir_history')) || [];
  let isPendingResult = localStorage.getItem('tanvir_pending') === 'true';

  async function fetchSignal() {
    if(isPendingResult) return; 
    const overlay = document.getElementById('analysis-overlay'), statusText = document.getElementById('status-text');
    overlay.style.display = 'flex';
    statusText.innerText = "SCANNING...";

    try {
        const res = await fetch('/api/fetch');
        const data = await res.json();
        if(data.asset) {
            curSignal = data;
            localStorage.setItem('tanvir_curSignal', JSON.stringify(data));
            updateUI(data);
            overlay.style.display = 'none';
            startTradeCountdown(data.time);
        } else {
            overlay.style.display = 'none';
            document.getElementById('asset-name').innerText = "NO SIGNAL";
            document.getElementById('signal-direction').innerText = "WAIT";
            document.getElementById('trade-timer').innerText = "00:00";
            setTimeout(fetchSignal, 5000);
        }
    } catch(e) { setTimeout(fetchSignal, 5000); }
  }

  function updateUI(data) {
    document.getElementById('asset-name').innerText = data.asset;
    const dir = document.getElementById('signal-direction');
    dir.innerText = data.dir; dir.className = data.dir;
    document.getElementById('signal-time').innerText = data.time;
    document.getElementById('confidence-level').innerText = "94%";
  }

  function startTradeCountdown(timeStr) {
    const [h, m] = timeStr.split(':').map(Number);
    const int = setInterval(() => {
        const now = new Date();
        const target = new Date();
        target.setHours(h, m, 0, 0);
        let rem = Math.floor((target - now) / 1000);
        if (rem < -60) { clearInterval(int); fetchSignal(); return; }
        if (rem <= 0) { 
            clearInterval(int); 
            document.getElementById('trade-countdown').style.display = 'none'; 
            startExpiry(target.getTime()); 
            return; 
        }
        document.getElementById('trade-timer').innerText = `${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')}`;
    }, 1000);
  }

  function startExpiry(startTime) {
    const expRow = document.getElementById('expiry-countdown'); expRow.style.display = 'block';
    const target = startTime + 60000;
    const int = setInterval(() => {
        const now = Date.now();
        let rem = Math.floor((target - now) / 1000);
        if (rem <= 0) { clearInterval(int); expRow.style.display = 'none'; showResultOption(); return; }
        document.getElementById('expiry-timer').innerText = `00:${rem.toString().padStart(2,'0')}`;
    }, 1000);
  }

  function showResultOption() {
    isPendingResult = true;
    localStorage.setItem('tanvir_pending', 'true');
    renderResultList();
    switchTab(1);
  }

  window.markAndNext = function(el, isWin) {
    total++; if(isWin) wins++;
    localStorage.setItem('tanvir_total', total);
    localStorage.setItem('tanvir_wins', wins);
    history.unshift({...curSignal, res: isWin ? 'WIN' : 'LOSS'});
    localStorage.setItem('tanvir_history', JSON.stringify(history));
    isPendingResult = false;
    localStorage.setItem('tanvir_pending', 'false');
    localStorage.removeItem('tanvir_curSignal');
    updateStats(); renderLast(); renderResultList();
    setTimeout(() => { switchTab(0); document.getElementById('trade-countdown').style.display = 'block'; fetchSignal(); }, 1000);
  }

  function updateStats() {
    const acc = total === 0 ? 0 : Math.round((wins/total)*100);
    const accEl = document.getElementById('overall-accuracy');
    accEl.innerText = acc + "%"; accEl.style.color = acc >= 80 ? "#00ff88" : "#ff3131";
  }

  function renderResultList() {
    const list = document.getElementById('result-list');
    if(isPendingResult && curSignal) {
        list.innerHTML = `<div class="trade-item"><div class="trade-left"><div class="trade-signal ${curSignal.dir}">${curSignal.dir}</div><div class="trade-info">${curSignal.asset} • ${curSignal.time}</div></div><div class="action-buttons"><div onclick="markAndNext(this, true)" class="win-btn">WIN</div><div onclick="markAndNext(this, false)" class="loss-btn">LOSS</div></div></div>`;
    } else { list.innerHTML = ""; }
  }

  function renderLast() {
    document.getElementById('last-signals-list').innerHTML = history.map(s => `<div class="trade-item"><div class="trade-left"><div class="trade-asset">${s.asset}</div><div class="trade-info">${s.time}</div></div><div style="text-align:right;"><div class="trade-signal ${s.dir}">${s.dir}</div><div style="color:${s.res=='WIN'?'#00ff88':'#ff3131'}; font-weight:700;">${s.res}</div></div></div>`).join('');
  }

  function switchTab(n) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
    document.getElementById('tab-0').style.display = n===0 ? 'block' : 'none';
    document.getElementById('tab-1').style.display = n===1 ? 'block' : 'none';
    document.getElementById('tab-2').style.display = n===2 ? 'block' : 'none';
  }

  window.onload = () => {
    updateStats(); renderLast();
    if(isPendingResult && curSignal) { updateUI(curSignal); showResultOption(); }
    else if(curSignal) { updateUI(curSignal); startTradeCountdown(curSignal.time); }
    else { fetchSignal(); }
  };
</script>
</body>
</html>
