<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TANVIR EXE | ADMIN LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #030304;
            background-image: 
                radial-gradient(circle at 50% 120%, #3d0b0b 0%, #030304 60%),
                radial-gradient(circle at 10% 10%, #1a0505 0%, transparent 20%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            background: rgba(15, 10, 10, 0.98);
            border: 1px solid rgba(255, 71, 87, 0.2);
            border-top: 3px solid #ff4757;
            border-radius: 12px;
            padding: 45px 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            position: relative;
            text-align: center;
        }

        .title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 5px;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 35px;
            text-shadow: 0 0 15px rgba(255, 71, 87, 0.5);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 11px;
            color: #ff4757;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 1.5px;
        }

        .input-box {
            width: 100%;
            background: rgba(20, 10, 10, 0.9);
            border: 1px solid #441111;
            padding: 15px;
            color: #fff;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

        .input-box:focus {
            border-color: #ff4757;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.2);
        }

        .login-btn {
            width: 100%;
            background: #ff4757;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 10px;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #ff6b81;
            box-shadow: 0 5px 20px rgba(255, 71, 87, 0.4);
            transform: translateY(-2px);
        }

        #notification {
            position: fixed;
            top: 20px;
            right: -350px;
            background: #0f0a0a;
            color: #fff;
            border-left: 4px solid #ff4757;
            padding: 18px 30px;
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3000;
        }

        #notification.show { right: 20px; }

        .scan-line {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 71, 87, 0.6), transparent);
            position: absolute;
            top: 0;
            left: 0;
            animation: scanning 3s linear infinite;
        }

        @keyframes scanning {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

<div id="notification">Invalid Credentials</div>

<div class="login-card">
    <div class="scan-line"></div>
    <h1 class="title">ADMIN ACCESS</h1>

    <form id="loginForm">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" class="input-box" placeholder="Enter User Name" required>
        </div>
        <div class="form-group">
            <label>Secret Password</label>
            <input type="password" id="password" class="input-box" placeholder="••••••••" required>
        </div>
        <button type="submit" class="login-btn">AUTHORIZE</button>
    </form>
</div>

<script>
(function () {
  'use strict';
  function isEditableTarget(el) {
    if (!el || el.nodeType !== 1) return false;
    const tag = el.tagName;
    if (tag === 'TEXTAREA') return true;
    if (tag === 'INPUT') {
      const t = (el.type || '').toLowerCase();
      return !['button', 'checkbox', 'radio', 'submit', 'reset', 'file', 'hidden'].includes(t);
    }
    return el.isContentEditable === true;
  }
  function stop(e) {
    e.preventDefault();
    e.stopPropagation();
    return false;
  }
  var DEVTOOL_CODES = { KeyI: 1, KeyJ: 1, KeyC: 1, KeyK: 1, KeyM: 1, KeyP: 1, KeyE: 1 };
  document.addEventListener('keydown', function (e) {
      if (isEditableTarget(e.target)) {
        var k = (e.key || '').toLowerCase();
        if ((e.ctrlKey || e.metaKey) && ['c', 'v', 'x', 'a'].includes(k)) return;
      }
      if (e.key === 'F12' || e.keyCode === 123) return stop(e);
      if (e.shiftKey && (e.key === 'F10' || e.code === 'F10')) return stop(e);
      var mod = e.ctrlKey || e.metaKey;
      var code = e.code || '';
      if (mod && e.shiftKey && !e.altKey && DEVTOOL_CODES[code]) return stop(e);
      if (code === 'Backquote') {
        if (e.ctrlKey && !e.metaKey && !e.altKey && !e.shiftKey) return stop(e);
        if (e.ctrlKey && !e.metaKey && e.shiftKey) return stop(e);
      }
      if (e.metaKey && e.altKey) {
        if (['KeyI', 'KeyJ', 'KeyC', 'KeyU'].indexOf(code) !== -1) return stop(e);
      }
      if (mod && !e.shiftKey && !e.altKey) {
        if (code === 'KeyU' || code === 'KeyS') return stop(e);
      }
      if (mod && e.shiftKey && code === 'KeyU') return stop(e);
    }, true);
  document.addEventListener('contextmenu', function (e) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }, true);
  document.addEventListener('mousedown', function (e) {
      if (e.button === 2) {
        e.preventDefault();
        e.stopPropagation();
      }
    }, true);
})();

    const loginForm = document.getElementById('loginForm');
    function showNotify(msg) {
        const n = document.getElementById('notification');
        n.innerText = msg;
        n.classList.add('show');
        setTimeout(() => n.classList.remove('show'), 3000);
    }
    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        
        fetch('/admin_login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: `username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`
        })
        .then(response => {
            if (response.redirected) {
                window.location.href = response.url;
            } else {
                return response.text();
            }
        })
        .then(html => {
            if (html && html.includes('Invalid')) {
                showNotify("Invalid Username or Password");
            }
        })
        .catch(error => {
            showNotify("Login Error");
        });
    });
</script>
</body>
</html>
